version: '3.9'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - resume_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/smartresume.db
      - SECRET_KEY=your-super-secret-key-change-in-production
    restart: unless-stopped

volumes:
  resume_data:
